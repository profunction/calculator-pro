<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <!-- Background -->
  <rect width="36" height="36" rx="9" fill="url(#lg)" filter="url(#glow)"/>
  
  <!-- Calculator body -->
  <rect x="8" y="6" width="20" height="24" rx="4" fill="white" opacity="0.95"/>
  
  <!-- Screen -->
  <rect x="10.5" y="8.5" width="15" height="7" rx="2" fill="url(#lg)" opacity="0.85"/>
  <!-- Screen content: equals sign -->
  <line x1="13" y1="11.5" x2="19" y2="11.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="14" x2="17" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Buttons row 1 -->
  <circle cx="12" cy="19" r="1.8" fill="url(#lg)" opacity="0.7"/>
  <circle cx="18" cy="19" r="1.8" fill="url(#lg)" opacity="0.7"/>
  <circle cx="24" cy="19" r="1.8" fill="#f5576c" opacity="0.85"/>
  
  <!-- Buttons row 2 -->
  <circle cx="12" cy="23.5" r="1.8" fill="url(#lg)" opacity="0.7"/>
  <circle cx="18" cy="23.5" r="1.8" fill="url(#lg)" opacity="0.7"/>
  <circle cx="24" cy="23.5" r="1.8" fill="url(#lg)" opacity="0.7"/>
  
  <!-- Buttons row 3 -->
  <rect x="10.2" y="27" width="3.6" height="2.2" rx="1" fill="url(#lg)" opacity="0.65"/>
  <rect x="16.2" y="27" width="3.6" height="2.2" rx="1" fill="url(#lg)" opacity="0.65"/>
  <rect x="22.2" y="27" width="3.6" height="2.2" rx="1" fill="#f093fb" opacity="0.8"/>
</svg>