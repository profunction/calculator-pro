<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo icon (left) -->
  <rect x="0" y="2" width="36" height="36" rx="8" fill="url(#logoGrad)"/>
  <!-- Calculator icon inside -->
  <rect x="7" y="8" width="22" height="24" rx="4" fill="white" opacity="0.95"/>
  <rect x="10" y="11" width="16" height="8" rx="2" fill="url(#logoGrad)" opacity="0.8"/>
  <rect x="10" y="22" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="16" y="22" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="22" y="22" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="10" y="27" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="16" y="27" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="22" y="27" width="4" height="3" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
  
  <!-- Text "Calculator Pro" (right) -->
  <text x="45" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Calculator</text>
  <text x="45" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="url(#logoGrad)">Pro</text>
</svg>